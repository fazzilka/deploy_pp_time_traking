version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: "09:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /server/frontend
    schedule:
      interval: weekly
      day: sunday
      time: "09:15"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore
      include: scope
    groups:
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /server/Backend
    schedule:
      interval: weekly
      day: sunday
      time: "09:30"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore
      include: scope
    groups:
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch