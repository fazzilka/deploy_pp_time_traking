image: ubuntu:latest

stages:
  - deploy

deploy production:
  stage: deploy
  only:
    - main
  script:
    - apt-get update && apt-get install -y openssh-client git
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p "$SSH_PORT" "$SERVER_IP" >> ~/.ssh/known_hosts
    - ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_IP" "cd /opt/time-tracking && git pull --ff-only && docker compose -f docker-compose.prod.yml --env-file .env up -d --build && docker image prune -f"
